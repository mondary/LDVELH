<style>
  :root {
    --bg: #f4f1ea;
    --ink: #191713;

    --line: #d7cec0;

  body {
    margin: 0;
    color: var(--ink);

  }
  header {
    position: sticky;
    top: 0;
    z-index: 5;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: center;
    padding: 18px 24px;
    background: rgba(244, 241, 234, 0.92);
    border-bottom: 1px solid var(--line);
    backdrop-filter: blur(12px);
  }
  h1 {
    margin: 0;
    font-size: 24px;
    line-height: 1;
  }
  .sub {
    margin-top: 5px;
    color: var(--muted);
    font-size: 13px;
  }
  .toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  input, select, button {
    font: inherit;
  }
  input, select {
    height: 36px;
    border: 1px solid var(--line);
    background: #fffdf8;
    color: var(--ink);
    padding: 0 10px;
    border-radius: 4px;
  }
  input { width: min(320px, 36vw); }
  button {
    height: 36px;
    border: 1px solid var(--line);
    background: #fffdf8;
    color: var(--ink);
    border-radius: 4px;
    padding: 0 12px;
    cursor: pointer;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  main {
    padding: 22px 24px 48px;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(5, minmax(130px, 1fr));
    gap: 10px;
    margin-bottom: 18px;
  }
  .stat {
    background: var(--paper);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    padding: 13px 14px;
    border-radius: 6px;
  }
  .stat strong {
    display: block;
    font-size: 24px;
    line-height: 1;
  }
  .stat span {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-size: 12px;
  }
  section {
    min-width: 0;
  }
  .panel {
    background: var(--paper);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    border-radius: 6px;
    overflow: hidden;
  }
  .panel-head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);

    margin: 0;
    font-size: 17px;

    font-size: 12px;

  }

    display: grid;
    grid-template-columns: 42px 72px minmax(240px, 1fr) minmax(300px, 1.15fr) 250px;
    gap: 12px;
    padding: 12px 14px;
    border-bottom: 1px solid rgba(215, 206, 192, 0.72);
  }

    position: sticky;
    top: 73px;
    z-index: 3;
    background: #f2eadc;
    color: var(--muted);
    font-size: 12px;

    font-weight: 700;

  .matches {
    display: grid;
    gap: 6px;
    min-width: 0;

  .match {
    display: grid;
    grid-template-columns: 46px minmax(0, 1fr);
    gap: 10px;
    align-items: start;
    padding: 7px 8px;

    background: rgba(255,255,255,0.58);

    line-height: 1.3;

    width: 46px;

    background: #eadfce;
    border: 1px solid rgba(25, 23, 19, 0.12);
    box-shadow: 0 6px 18px rgba(49, 35, 17, 0.12);

  .cover-placeholder {
    display: grid;
    place-items: center;
    color: var(--muted);
    font-size: 10px;
    text-align: center;
  }
  .match small {
    display: block;
    margin-top: 3px;

    display: inline-flex;
    align-items: center;
    width: fit-content;
    min-height: 28px;
    padding: 4px 8px;
    border-radius: 4px;
    background: rgba(40, 115, 79, 0.12);
    color: var(--good);
    border: 1px solid rgba(40, 115, 79, 0.28);
    font-size: 12px;
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-weight: 700;
  }
  .decision-buttons {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  .decision-buttons button {
    height: 30px;
    padding: 0 7px;
    font-size: 12px;
  }
  .decision-buttons button.active[data-decision="add"] { background: var(--good); border-color: var(--good); color: white; }
  .decision-buttons button.active[data-decision="skip"] { background: var(--bad); border-color: var(--bad); color: white; }
  .decision-buttons button.active[data-decision="merge"] { background: var(--warn); border-color: var(--warn); color: white; }
  .decision-buttons button.active[data-decision="review"] { background: var(--ink); border-color: var(--ink); color: white; }
  .decision-help {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.25;
  }

    width: 100%;

    border-radius: 4px;
    background: #fffdf8;

    .table-head { display: none; }
    .row { grid-template-columns: 32px 52px 1fr; }
    .matches, .actions { grid-column: 3; }
    input { width: 100%; }
  }

function escapeHTML(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function normalizeTitle(title) {
  const normalized = String(title || "")
    .replace(/\s*\(([^)]+)\)\s*$/, "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/œ/g, "oe")
    .replace(/æ/g, "ae")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, " ")
    .replace(/\s+/g, " ")
    .trim();
  return TITLE_ALIASES.get(normalized) || normalized;
}

function matchKey(series, titleKey) {
  return `${series || ""}#${titleKey || ""}`;
}

function coverIsbn(book) {
  return book?.editions?.[0]?.isbn || book?.isbn || "";
}

function coverHTML(isbn, title) {
  return coverWithFallbackHTML({
    title,
    primaryUrl: isbn ? `assets/covers/small/${isbn}.webp` : "",
  });
}

function coverWithFallbackHTML({ title, primaryUrl, fallbackUrl = "" }) {
  if (!primaryUrl && !fallbackUrl) return `<div class="cover-thumb cover-placeholder">Sans<br>image</div>`;
  const src = primaryUrl || fallbackUrl;
  return `<img class="cover-thumb" src="${escapeHTML(src)}" alt="${escapeHTML(title)}" loading="lazy" data-fallback-cover="${escapeHTML(fallbackUrl)}" onerror="swapCoverFallback(this)">`;
}

function sourceCoverHTML(row) {
  return coverWithFallbackHTML({
    title: row.title,
    primaryUrl: row.sourceIsbn ? `assets/covers/small/${row.sourceIsbn}.webp` : "",
    fallbackUrl: row.sourceCoverUrl || "",
  });
}

function coverSearchHTML(row) {
  const query = encodeURIComponent(`${row.title} ${row.seriesName} couverture livre dont vous etes le heros`);
  const gallimardQuery = encodeURIComponent(row.title);
  return `
    <div class="match">
      <div class="cover-thumb cover-placeholder">À<br>chercher</div>
      <div>
        <strong>Recherche couverture</strong>
        <small>
          <a href="https://www.google.com/search?tbm=isch&q=${query}" target="_blank" rel="noreferrer">Google Images</a>
          · <a href="https://www.gallimard-jeunesse.fr/search?SearchText=${gallimardQuery}" target="_blank" rel="noreferrer">Gallimard</a>
        </small>
      </div>
    </div>
  `;
}

function swapCoverFallback(image) {
  const fallbackUrl = image.dataset.fallbackCover;
  if (fallbackUrl && image.src !== fallbackUrl) {
    image.removeAttribute("data-fallback-cover");
    image.src = fallbackUrl;
    return;
  }
  image.replaceWith(Object.assign(document.createElement("div"), {
    className: "cover-thumb cover-placeholder",
    innerHTML: "Sans<br>image",
  }));
}

function parseExpected() {
  let blockIndex = 0;
  let blockOffset = 0;
  const rows = EXPECTED_RAW
    .split(/\n/)
    .map(line => line.match(/^\s*([0-9]{2}[a-z]?)\s*:\s*(.+?)\s*$/))
    .filter(Boolean)
    .map((match, index) => {
      const block = EXPECTED_SERIES_BLOCKS[blockIndex];
      if (!block) throw new Error(`Bloc de série manquant pour la ligne ${index + 1}`);
      const item = {
        id: `expected-${index + 1}`,
        index: index + 1,
        number: match[1],
        title: match[2],
        series: block[0],
        seriesName: block[1],
        key: normalizeTitle(match[2]),
      };
      const sourceData = EXPECTED_SOURCE_DATA.get(matchKey(item.series, item.key)) || {};
      item.sourceNote = sourceData.note || "";
      item.sourceIsbn = sourceData.isbn || "";
      item.sourceUrl = sourceData.url || "";
      item.sourceCoverUrl = sourceData.coverUrl || "";
      blockOffset += 1;
      if (blockOffset >= block[2]) {
        blockIndex += 1;
        blockOffset = 0;
      }
      return item;
    });
  const expectedTotal = EXPECTED_SERIES_BLOCKS.reduce((sum, block) => sum + block[2], 0);
  if (rows.length !== expectedTotal) {
    throw new Error(`Liste canonique incohérente : ${rows.length} titres pour ${expectedTotal} attendus par blocs`);
  }
  return rows;
}

function buildRows(expected, data) {
  const seriesById = new Map((data.series || []).map(series => [series.id, series.name]));
  const actual = (data.books || []).map((book, index) => ({
    id: book.id || `book-${index}`,
    title: book.title,
    number: book.number,
    series: book.series,
    seriesName: seriesById.get(book.series) || book.series || "",
    year: book.year,
    isbn: coverIsbn(book),
    key: normalizeTitle(book.title),
    raw: book,
    expectedMatches: [],
  }));
  const actualByKey = new Map();
  actual.forEach(item => {
    const key = matchKey(item.series, item.key);
    if (!actualByKey.has(key)) actualByKey.set(key, []);
    actualByKey.get(key).push(item);
  });

  const usedActualIds = new Set();
  const built = expected.map(item => {
    const matches = actualByKey.get(matchKey(item.series, item.key)) || [];
    matches.forEach(match => {
      match.expectedMatches.push(item);
      usedActualIds.add(match.id);
    });
    return { ...item, matches, kind: "expected" };
  });
  const actualOnly = actual
    .filter(item => !usedActualIds.has(item.id))
    .map(item => ({
      id: `actual-only:${item.id}`,
      index: null,
      number: "",
      title: "",
      key: item.key,
      sourceNote: "",
      sourceIsbn: "",
      sourceUrl: "",
      sourceCoverUrl: "",
      matches: [item],
      kind: "actual-only",
    }));
  return { built: [...built, ...actualOnly], actual };
}

function getDecision(id) {
  return decisions[id] || { action: "", note: "" };
}

function saveDecision(id, patch) {
  decisions[id] = { ...getDecision(id), ...patch };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(decisions));
  render();
}

function autoStatus(row) {
  if (row.kind === "expected" && row.matches.length > 0) return "ok";
  return "todo";
}

function rowStatus(row) {
  const decision = getDecision(row.id);
  return decision.action || autoStatus(row);
}

function matchesFilter(row, search, filter) {
  const decision = getDecision(row.id);
  const status = rowStatus(row);
  const haystack = [
    row.number,
    row.title,
    row.key,
    row.seriesName,
    row.sourceNote,
    row.sourceIsbn,
    row.sourceUrl,
    decision.note,
    ...row.matches.flatMap(match => [match.title, match.seriesName, match.id]),
  ].join(" ").toLowerCase();
  if (search && !haystack.includes(search)) return false;
  if (filter === "all") return true;
  if (filter === "todo") return status === "todo";
  if (["ok", "add", "skip", "merge", "review"].includes(filter)) return status === filter;
  if (filter === "nomatch") return row.kind === "actual-only" || row.matches.length === 0;
  if (filter === "multi") return row.matches.length > 1;
  return true;
}

function renderStats() {
  const counts = rows.reduce((acc, row) => {
    const status = rowStatus(row);
    acc[status] = (acc[status] || 0) + 1;
    if (row.kind === "actual-only" || !row.matches.length) acc.nomatch += 1;
    if (row.matches.length > 1) acc.multi += 1;
    return acc;
  }, { ok: 0, todo: 0, add: 0, skip: 0, merge: 0, review: 0, nomatch: 0, multi: 0 });
  document.getElementById("stats").innerHTML = `
    <div class="stat"><strong>${expectedCount}</strong><span>titres référence</span></div>
    <div class="stat"><strong>${counts.ok}</strong><span>OK auto</span></div>
    <div class="stat"><strong>${counts.todo}</strong><span>à décider</span></div>
    <div class="stat"><strong>${actualRows.length}</strong><span>entrées library.json</span></div>
    <div class="stat"><strong>${counts.add}/${counts.merge}/${counts.skip}</strong><span>ajouter / fusionner / ignorer</span></div>
  `;
}

function renderRows() {
  const search = document.getElementById("search").value.trim().toLowerCase();
  const filter = document.getElementById("filter").value;
  const visible = rows.filter(row => matchesFilter(row, search, filter));
  document.getElementById("canonicalCount").textContent = `${visible.length} lignes affichées / ${rows.length}`;
  document.getElementById("rows").innerHTML = visible.map(row => {
    const decision = getDecision(row.id);
    const status = rowStatus(row);
    const matchesHTML = row.matches.length
      ? row.matches.map(match => `
        <div class="match">
          ${coverHTML(match.isbn, match.title)}
          <div>
            <strong>${escapeHTML(match.title)}</strong>
            <small>${escapeHTML(match.seriesName)} · n°${escapeHTML(match.number ?? "?")} · ${escapeHTML(match.year ?? "?")} · ${escapeHTML(match.id)}</small>
          </div>
        </div>
      `).join("")
      : row.sourceIsbn || row.sourceCoverUrl || row.sourceUrl
        ? `
          <div class="match">
            ${sourceCoverHTML(row)}
            <div>
              <strong>Couverture candidate</strong>
              <small>${escapeHTML(row.sourceIsbn ? `ISBN ${row.sourceIsbn}` : "Source externe")}${row.sourceUrl ? ` · <a href="${escapeHTML(row.sourceUrl)}" target="_blank" rel="noreferrer">source</a>` : ""}</small>
            </div>
          </div>
          <div class="none">Aucun match exact dans library.json</div>
        `
        : `${coverSearchHTML(row)}<div class="none">Aucun match exact dans library.json</div>`;
    const canonicalHTML = row.kind === "expected"
      ? `<div class="title">${escapeHTML(row.title)}</div><div class="key">${escapeHTML(row.seriesName)} · ${escapeHTML(row.key)}</div>${row.sourceNote ? `<div class="key">${escapeHTML(row.sourceNote)}</div>` : ""}${row.sourceUrl ? `<div class="key"><a href="${escapeHTML(row.sourceUrl)}" target="_blank" rel="noreferrer">Voir la source</a></div>` : ""}`
      : `<div class="none">Absent de la liste canonique</div><div class="key">${escapeHTML(row.key)}</div>`;
    const rowLabel = row.kind === "expected"
      ? (row.matches.length ? "Match auto" : "À checker")
      : "En trop ?";
    const actionHTML = status === "ok"
      ? `<div class="status-pill">OK auto</div>`
      : `
        <div class="decision-buttons">
          ${["add", "skip", "merge", "review"].map(action => {
            const labels = { add: "Ajouter", skip: "Ne pas ajouter", merge: "Fusionner", review: "À revoir" };
            return `<button data-row-action="${row.id}" data-decision="${action}" class="${decision.action === action ? "active" : ""}">${labels[action]}</button>`;
          }).join("")}
        </div>
        <div class="decision-help">${row.kind === "actual-only" ? "Entrée présente dans library.json mais pas dans ta liste." : "Titre présent dans ta liste mais pas retrouvé dans library.json."}</div>
      `;
    return `
      <article class="row ${status === "ok" ? "" : "needs-check"}">
        <div>${status === "ok" ? "✓" : ""}</div>
        <div class="num">${escapeHTML(row.number)}</div>
        <div>
          ${canonicalHTML}
        </div>
        <div class="matches">${matchesHTML}</div>
        <div class="actions">
          ${actionHTML}
          <div class="key">${escapeHTML(rowLabel)}</div>
          <textarea data-note="${row.id}" placeholder="Note...">${escapeHTML(decision.note || "")}</textarea>
        </div>
      </article>
    `;
  }).join("");
}

function render() {
  renderStats();
  renderRows();
}

function exportDecisions() {
  const payload = {
    exportedAt: new Date().toISOString(),
    storageKey: STORAGE_KEY,
    rows: rows.map(row => ({
      number: row.number,
      title: row.title,
      series: row.series,
      seriesName: row.seriesName,
      key: row.key,
      sourceNote: row.sourceNote || "",
      sourceIsbn: row.sourceIsbn || "",
      sourceUrl: row.sourceUrl || "",
      sourceCoverUrl: row.sourceCoverUrl || "",
      matches: row.matches.map(match => ({
        id: match.id,
        title: match.title,
        series: match.series,
        seriesName: match.seriesName,
        number: match.number,
        year: match.year,
        isbn: match.isbn,
      })),
      status: rowStatus(row),
      decision: getDecision(row.id),
    })),
    actualRows: actualRows.map(item => ({
      id: item.id,
      title: item.title,
      series: item.series,
      seriesName: item.seriesName,
      number: item.number,
      year: item.year,
      isbn: item.isbn,
      key: item.key,
      expectedMatches: item.expectedMatches.map(match => ({
        number: match.number,
        title: match.title,
        key: match.key,
      })),
      decision: getDecision(`actual:${item.id}`),
    })),
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = "ldvelh-audit-decisions.json";
  link.click();
  URL.revokeObjectURL(url);
}

document.addEventListener("click", event => {
  const actionButton = event.target.closest("[data-row-action][data-decision]");
  if (!actionButton) return;
  const current = getDecision(actionButton.dataset.rowAction);
  const nextAction = current.action === actionButton.dataset.decision ? "" : actionButton.dataset.decision;
  saveDecision(actionButton.dataset.rowAction, { action: nextAction });
});

document.addEventListener("input", event => {
  if (event.target.id === "search") {
    renderRows();
  }
  const note = event.target.closest("[data-note]");
  if (note) {
    decisions[note.dataset.note] = { ...getDecision(note.dataset.note), note: note.value };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(decisions));
    renderStats();
  }
});

document.getElementById("filter").addEventListener("change", () => {
  renderRows();
});
document.getElementById("reset").addEventListener("click", () => {
  document.getElementById("search").value = "";
  document.getElementById("filter").value = "all";
  renderRows();
});
document.getElementById("export").addEventListener("click", exportDecisions);

async function init() {
  const res = await fetch("data/library.json");
  const data = await res.json();
  const expected = parseExpected();
  expectedCount = expected.length;
  const result = buildRows(expected, data);
  rows = result.built;
  actualRows = result.actual;
  render();
}

init().catch(error => {
  document.getElementById("rows").innerHTML = `<div class="row"><div></div><div class="none">Impossible de charger library.json : ${escapeHTML(error.message)}</div></div>`;
});
</script>
</body>
</html>
